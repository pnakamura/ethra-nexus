name: ethra-nexus-prod

# ============================================================
# SEGURANÇA:
# - Imagens com versão pinada (sem :latest em produção)
# - App e N8N usam Docker secrets (não environment para API keys)
# - Serviços internos (N8N, SilverBullet) só escutam localhost
# - Nginx como reverse proxy com TLS + security headers
# - Containers com read_only filesystem onde possível
# - Sem privileged mode
# ============================================================

services:
  # ── App (imagem de produção) ───────────────────────────────
  app:
    image: ghcr.io/pnakamura/ethra-nexus:${NEXUS_VERSION:-0.1.0}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # apenas localhost — nginx faz o proxy
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - APP_URL=${APP_URL}
      # Secrets montados como arquivos, não como env vars
      - SUPABASE_SERVICE_ROLE_KEY_FILE=/run/secrets/supabase_service_role_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENROUTER_API_KEY_FILE=/run/secrets/openrouter_api_key
      - APP_SECRET_FILE=/run/secrets/app_secret
    secrets:
      - supabase_service_role_key
      - anthropic_api_key
      - openrouter_api_key
      - app_secret
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      n8n:
        condition: service_healthy

  # ── N8N (produção) ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.68.0    # versão pinada
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${APP_URL}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - GENERIC_TIMEZONE=America/Sao_Paulo
      # N8N recebe as credenciais de AI via secrets
      # Os workflows acessam via credential store do N8N, não via env
      - SUPABASE_URL=${SUPABASE_URL}
    secrets:
      - anthropic_api_key
      - openrouter_api_key
      - supabase_service_role_key
    security_opt:
      - no-new-privileges:true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── SilverBullet (produção) ────────────────────────────────
  silverbullet:
    image: ghcr.io/silverbulletmd/silverbullet:0.10.0  # versão pinada
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - SB_USER=${SB_USER}
    security_opt:
      - no-new-privileges:true
    volumes:
      - wikis_data:/space

  # ── Nginx reverse proxy + TLS ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine    # versão pinada
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    depends_on:
      - app
      - n8n
      - silverbullet

# ── Docker Secrets ─────────────────────────────────────────────
# Em produção, crie estes arquivos com permissão 600 no host:
#   echo "sk-ant-..." > ./secrets/anthropic_api_key.txt
#   chmod 600 ./secrets/anthropic_api_key.txt
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openrouter_api_key:
    file: ./secrets/openrouter_api_key.txt
  supabase_service_role_key:
    file: ./secrets/supabase_service_role_key.txt
  app_secret:
    file: ./secrets/app_secret.txt

volumes:
  n8n_data:
  wikis_data:
  nginx_logs:
