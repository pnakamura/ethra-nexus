# ============================================================
# Ethra Nexus — Nginx Reverse Proxy + Security Headers
#
# SEGURANÇA:
# - HTTPS obrigatório (HTTP → redirect 301)
# - HSTS com preload
# - CSP restritivo
# - Rate limiting por IP
# - Proteção contra clickjacking, XSS, MIME sniffing
# - Proxy headers corretos (X-Real-IP, etc.)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Oculta versão do Nginx
    server_tokens off;

    # Rate limiting — 10 requests/segundo por IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers (TODAS as respostas) ────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # Limita tamanho de upload (documentos para wiki)
        client_max_body_size 50M;

        # ── App (frontend + API) ─────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── N8N (admin only) ─────────────────────────────────
        location /n8n/ {
            limit_req zone=api burst=10 nodelay;

            # IP whitelist (descomentar e configurar em produção)
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://n8n:5678/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── N8N Webhooks (rate limit separado) ────────────────
        location /webhook/ {
            limit_req zone=webhook burst=50 nodelay;

            proxy_pass http://n8n:5678/webhook/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SilverBullet (admin only) ────────────────────────
        location /wiki/ {
            limit_req zone=api burst=10 nodelay;

            # IP whitelist (descomentar em produção)
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://silverbullet:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (sem rate limit) ─────────────────────
        location /health {
            proxy_pass http://app:3000/health;
        }

        # Bloqueia acesso a arquivos ocultos
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
