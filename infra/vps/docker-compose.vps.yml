name: ethra-nexus

# ============================================================
# Ethra Nexus — Stack VPS otimizado para 4GB RAM
#
# Consumo estimado:
#   PostgreSQL + pgvector    ~400MB
#   Ethra Nexus API          ~200MB
#   N8N                      ~350MB
#   SilverBullet             ~80MB
#   Nginx                    ~20MB
#   ─────────────────────────────
#   TOTAL                    ~1.05GB (sobram ~2.7GB para OS + swap)
#
# PostgREST e GoTrue removidos — o backend usa Fastify + Drizzle
# com conexão direta ao PostgreSQL via DATABASE_URL.
# Economia: ~192MB RAM (64M PostgREST + 128M GoTrue).
#
# Serviços do Supabase OMITIDOS para economizar RAM:
#   - Supabase Studio (dashboard web) — usar psql ou DBeaver remoto
#   - Realtime — não usado pelo Ethra Nexus
#   - Storage API — arquivos ficam no filesystem via volumes
#   - Kong — Nginx já faz o proxy
#   - Meta — não necessário
# ============================================================

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: supabase/postgres:15.6.1.143
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ethra-nexus
      # Extensões carregadas no init
      POSTGRES_INITDB_ARGS: "--locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # Tuning para 4GB RAM VPS (PostgreSQL usa ~400MB)
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c wal_buffers=8MB
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Ethra Nexus API (AIOS Master + Skills) ─────────────────
  api:
    image: ghcr.io/pnakamura/ethra-nexus:${NEXUS_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      WIKIS_BASE_PATH: /data/wikis
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/ethra-nexus
      # AI Providers
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_key
      OPENROUTER_API_KEY_FILE: /run/secrets/openrouter_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_key
    secrets:
      - anthropic_key
      - openrouter_key
      - openai_key
    volumes:
      - wikis_data:/data/wikis
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── N8N (automação) ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.68.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${DOMAIN}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${DOMAIN}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      GENERIC_TIMEZONE: America/Sao_Paulo
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ethra-nexus
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M

  # ── SilverBullet (wiki UI) ─────────────────────────────────
  silverbullet:
    image: ghcr.io/silverbulletmd/silverbullet:0.10.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      SB_USER: ${SB_USER:-admin:${SB_PASSWORD}}
    volumes:
      - wikis_data:/space
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Nginx + SSL (reverse proxy) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - n8n
      - silverbullet
    deploy:
      resources:
        limits:
          memory: 32M

  # ── Certbot (SSL automático via Let's Encrypt) ─────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

secrets:
  anthropic_key:
    file: ./secrets/anthropic_key.txt
  openrouter_key:
    file: ./secrets/openrouter_key.txt
  openai_key:
    file: ./secrets/openai_key.txt

volumes:
  postgres_data:
  n8n_data:
  wikis_data:
  certbot_certs:
  certbot_www:
