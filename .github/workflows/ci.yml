name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Debug — list workspace packages
        run: |
          echo "=== Node version ===" && node --version
          echo "=== NPM version ===" && npm --version
          echo "=== Turbo version ===" && npx turbo --version
          echo "=== Installed workspaces ===" && npm ls --depth=0 --workspaces 2>/dev/null || true

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: npm audit
        # Informational only — não bloqueia o pipeline
        run: npm audit --audit-level=critical || echo "⚠️  Audit warnings present (non-blocking)"

      - name: Check for leaked secrets
        run: |
          # Garante que nenhuma chave de API vazou no código
          # Padrão requer ≥10 chars alfanuméricos após o prefixo para
          # evitar falso positivo com regex patterns em sanitize.ts
          if grep -rE "(sk-ant-|sk-or-)[A-Za-z0-9]{10,}|eyJ[A-Za-z0-9+/]{100,}" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=dist .; then
            echo "ERRO: Possível chave de API detectada no código"
            exit 1
          fi
          echo "OK: Nenhuma chave detectada"

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ethra-nexus:latest
            ghcr.io/${{ github.repository_owner }}/ethra-nexus:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
